name: Update stats card

on:
  schedule:
    - cron: "15 21 * * *"   # JST 6:15 (blog workflow の後)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        env:
          STATS_PAT: ${{ secrets.STATS_PAT }}
        run: node scripts/update-stats.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats-card.svg stats-data.json
          git diff --cached --quiet || { git commit -m "Update stats card"; git push; }
